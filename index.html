<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="安心小屏">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=yes">
  <meta name="theme-color" content="#235a69">
  <meta name="description" content="安心小屏 - 旧手机改造的老人陪伴与远程照护助手">
  <title>安心小屏</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <div id="app">
    <!-- ======== 角色选择提示（首次启动） ======== -->
    <div class="role-picker" id="role-picker">
      <div class="role-picker-inner">
        <div class="role-picker-logo">
          <svg viewBox="0 0 48 48" width="48" height="48"><circle cx="24" cy="24" r="22" fill="none" stroke="#235a69" stroke-width="3"/><path d="M16 32c0-4.4 3.6-8 8-8s8 3.6 8 8" fill="none" stroke="#c86f32" stroke-width="2.5" stroke-linecap="round"/><circle cx="24" cy="18" r="5" fill="none" stroke="#c86f32" stroke-width="2.5"/></svg>
        </div>
        <h2>欢迎使用安心小屏</h2>
        <p class="role-picker-desc">请问您是哪位使用者？</p>
        <div class="role-picker-options">
          <button class="role-card" onclick="App.pickRole('elder')">
            <div class="role-icon elder-role-icon">
              <svg viewBox="0 0 40 40" width="40" height="40"><circle cx="20" cy="14" r="6" fill="none" stroke="currentColor" stroke-width="2.5"/><path d="M8 34c0-6.6 5.4-12 12-12s12 5.4 12 12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
            </div>
            <strong>我是老人</strong>
            <span>进入大按钮桌面</span>
          </button>
          <button class="role-card" onclick="App.pickRole('family')">
            <div class="role-icon family-role-icon">
              <svg viewBox="0 0 40 40" width="40" height="40"><circle cx="14" cy="14" r="5" fill="none" stroke="currentColor" stroke-width="2"/><path d="M4 32c0-5.5 4.5-10 10-10s10 4.5 10 10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="28" cy="14" r="4" fill="none" stroke="currentColor" stroke-width="2"/><path d="M20 32c0-4.4 3.6-8 8-8s8 3.6 8 8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            </div>
            <strong>我是子女</strong>
            <span>管理提醒和照护</span>
          </button>
        </div>
      </div>
    </div>

    <!-- ======== 老人端首页（默认显示） ======== -->
    <main id="elder-screen" class="screen active">
      <!-- 隐私提示条（监控/通话时显示） -->
      <div class="privacy-bar" id="privacy-bar">
        <svg viewBox="0 0 20 20" width="16" height="16"><rect x="2" y="5" width="16" height="10" rx="2" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="10" cy="10" r="3" fill="none" stroke="currentColor" stroke-width="2"/><line x1="4" y1="2" x2="6" y2="5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="16" y1="2" x2="14" y2="5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <span id="privacy-bar-text">摄像头正在使用中 - 子女正在远程看护</span>
      </div>

      <!-- 顶部：问候 + 时钟 -->
      <header class="elder-header">
        <div class="elder-greeting-wrap">
          <div class="elder-avatar-sm">
            <svg viewBox="0 0 32 32" width="32" height="32"><circle cx="16" cy="11" r="5" fill="#c86f32"/><path d="M6 30c0-5.5 4.5-10 10-10s10 4.5 10 10" fill="#c86f32"/></svg>
          </div>
          <h1 id="elder-greeting">早上好，陈阿姨</h1>
        </div>
        <div class="time-box">
          <strong id="clock-time">--:--</strong>
          <span id="clock-date">--</span>
        </div>
      </header>

      <!-- 信息条：天气 + 下一项提醒，紧凑横排 -->
      <section class="info-strip">
        <div class="info-strip-item">
          <svg viewBox="0 0 20 20" width="18" height="18" class="info-strip-svg"><circle cx="10" cy="10" r="4" fill="none" stroke="#e67e22" stroke-width="2"/><line x1="10" y1="2" x2="10" y2="4" stroke="#e67e22" stroke-width="2" stroke-linecap="round"/><line x1="10" y1="16" x2="10" y2="18" stroke="#e67e22" stroke-width="2" stroke-linecap="round"/><line x1="2" y1="10" x2="4" y2="10" stroke="#e67e22" stroke-width="2" stroke-linecap="round"/><line x1="16" y1="10" x2="18" y2="10" stroke="#e67e22" stroke-width="2" stroke-linecap="round"/></svg>
          <span>21℃ 多云，适合散步</span>
        </div>
        <div class="info-strip-divider"></div>
        <div class="info-strip-item">
          <svg viewBox="0 0 20 20" width="18" height="18" class="info-strip-svg"><path d="M10 2a6 6 0 016 6c0 4-6 10-6 10S4 12 4 8a6 6 0 016-6zm0 8a2 2 0 100-4 2 2 0 000 4z" fill="none" stroke="#c0392b" stroke-width="1.8"/></svg>
          <span id="next-reminder-inline">暂无提醒</span>
        </div>
      </section>

      <!-- 大按钮区（2 行 3 列，图标按钮） -->
      <section class="elder-actions" aria-label="老人端功能">
        <button class="elder-action" data-view="assistant">
          <span class="action-icon-wrap">
            <svg viewBox="0 0 40 40" width="36" height="36"><rect x="6" y="4" width="28" height="24" rx="4" fill="none" stroke="currentColor" stroke-width="2.5"/><circle cx="20" cy="16" r="2" fill="currentColor"/><path d="M14 28c0-3.3 2.7-6 6-6s6 2.7 6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </span>
          <span>问助手</span>
        </button>
        <button class="elder-action" data-view="entertainment">
          <span class="action-icon-wrap">
            <svg viewBox="0 0 40 40" width="36" height="36"><circle cx="20" cy="20" r="14" fill="none" stroke="currentColor" stroke-width="2.5"/><polygon points="16,13 28,20 16,27" fill="currentColor"/></svg>
          </span>
          <span>听一会儿</span>
        </button>
        <button class="elder-action" data-view="reminders">
          <span class="action-icon-wrap">
            <svg viewBox="0 0 40 40" width="36" height="36"><circle cx="20" cy="22" r="14" fill="none" stroke="currentColor" stroke-width="2.5"/><line x1="20" y1="12" x2="20" y2="22" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/><line x1="20" y1="22" x2="26" y2="22" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/><rect x="16" y="4" width="8" height="4" rx="1" fill="none" stroke="currentColor" stroke-width="2"/></svg>
          </span>
          <span>今日提醒</span>
        </button>
        <button class="elder-action" data-view="family">
          <span class="action-icon-wrap">
            <svg viewBox="0 0 40 40" width="36" height="36"><circle cx="14" cy="14" r="5" fill="none" stroke="currentColor" stroke-width="2.5"/><path d="M4 32c0-5.5 4.5-10 10-10s10 4.5 10 10" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/><circle cx="28" cy="12" r="4" fill="none" stroke="currentColor" stroke-width="2"/><path d="M20 30c0-4.4 3.6-8 8-8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </span>
          <span>呼叫家人</span>
        </button>
        <button class="elder-action danger" data-view="emergency">
          <span class="action-icon-wrap">
            <svg viewBox="0 0 40 40" width="36" height="36"><path d="M20 4C11.2 4 4 11.2 4 20s7.2 16 16 16 16-7.2 16-16S28.8 4 20 4z" fill="none" stroke="currentColor" stroke-width="2.5"/><path d="M20 10v8m0 4v2" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg>
          </span>
          <span>紧急联系</span>
        </button>
        <button class="elder-action muted" data-view="settings">
          <span class="action-icon-wrap">
            <svg viewBox="0 0 40 40" width="36" height="36"><circle cx="20" cy="20" r="6" fill="none" stroke="currentColor" stroke-width="2.5"/><path d="M20 2v4M20 34v4M38 20h-4M6 20H2M33 7l-3 3M10 30l-3 3M33 33l-3-3M10 10L7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </span>
          <span>简单设置</span>
        </button>
      </section>

      <!-- 角色形象：状态表情 + 快捷入口 -->
      <div class="elder-mascot" id="elder-mascot" onclick="Elder.tapMascot()">
        <div class="mascot-face" id="mascot-face"></div>
        <span class="mascot-label" id="mascot-label">点我说句话</span>
      </div>
    </main>

    <!-- ======== 全屏功能弹窗（替代抽屉） ======== -->
    <div class="fullscreen-panel" id="fullscreen-panel">
      <header class="panel-header">
        <button class="panel-back" id="panel-back" aria-label="返回">
          <svg viewBox="0 0 20 20" width="18" height="18"><path d="M13 4l-6 6 6 6" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          返回
        </button>
        <h2 class="panel-title" id="panel-title"></h2>
      </header>
      <div class="panel-body" id="panel-body"></div>
    </div>

    <!-- ======== 子女端 ======== -->
    <main id="family-screen" class="screen">
      <header class="family-header">
        <div class="family-header-left">
          <svg viewBox="0 0 36 36" width="36" height="36" class="family-header-icon"><circle cx="18" cy="12" r="5" fill="#235a69"/><path d="M6 34c0-6.6 5.4-12 12-12s12 5.4 12 12" fill="#235a69" opacity="0.3"/></svg>
          <div>
            <p class="kicker">子女端</p>
            <h1>照护概览</h1>
          </div>
        </div>
        <div class="family-header-actions">
          <button class="btn-primary btn-icon-text" id="btn-monitor">
            <svg viewBox="0 0 20 20" width="18" height="18"><rect x="2" y="5" width="16" height="10" rx="2" fill="none" stroke="currentColor" stroke-width="1.8"/><circle cx="10" cy="10" r="3" fill="none" stroke="currentColor" stroke-width="1.8"/><line x1="4" y1="2" x2="6" y2="5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="16" y1="2" x2="14" y2="5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            远程监控
          </button>
          <button class="btn-primary btn-icon-text" id="btn-call">
            <svg viewBox="0 0 20 20" width="18" height="18"><path d="M3.6 7.2a1.2 1.2 0 010-1.7l1-1a1.2 1.2 0 011.7 0l.8.8a1.2 1.2 0 01.2 1.3 6 6 0 00-.1.8 6 6 0 003.4 3.4c.4.2.9.1 1.3-.2l.8-.8a1.2 1.2 0 011.7 0l1 1a1.2 1.2 0 010 1.7 8 8 0 01-11.2 0l-1-1z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            发起视频
          </button>
        </div>
      </header>

      <!-- 概览卡片 -->
      <section class="family-overview">
        <article class="metric-card">
          <div class="metric-card-icon online-icon">
            <svg viewBox="0 0 24 24" width="22" height="22"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/><path d="M12 7v5l3 3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </div>
          <div class="metric-card-body">
            <span class="metric-label">设备状态</span>
            <strong id="device-status">在线</strong>
            <p id="last-seen">刚刚有互动</p>
          </div>
        </article>
        <article class="metric-card">
          <div class="metric-card-icon reminder-icon">
            <svg viewBox="0 0 24 24" width="22" height="22"><circle cx="12" cy="14" r="9" fill="none" stroke="currentColor" stroke-width="2"/><line x1="12" y1="8" x2="12" y2="14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="12" y1="14" x2="16" y2="14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><rect x="9" y="2" width="6" height="3" rx="1" fill="none" stroke="currentColor" stroke-width="2"/></svg>
          </div>
          <div class="metric-card-body">
            <span class="metric-label">今日提醒</span>
            <strong id="reminder-count">0 项</strong>
            <p id="reminder-hint">还没有创建提醒</p>
          </div>
        </article>
        <article class="metric-card alert" id="alert-panel">
          <div class="metric-card-icon alert-icon">
            <svg viewBox="0 0 24 24" width="22" height="22"><path d="M12 2L2 22h20L12 2z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><line x1="12" y1="10" x2="12" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="18" r="1" fill="currentColor"/></svg>
          </div>
          <div class="metric-card-body">
            <span class="metric-label">需要关注</span>
            <strong id="alert-count">0 项</strong>
            <p id="alert-hint">暂无异常</p>
          </div>
        </article>
        <article class="metric-card monitor-card" id="monitor-card" onclick="WebRTC.startMonitor()">
          <div class="metric-card-icon monitor-icon">
            <svg viewBox="0 0 24 24" width="22" height="22"><rect x="3" y="7" width="18" height="12" rx="2" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="13" r="3" fill="none" stroke="currentColor" stroke-width="2"/><line x1="4" y1="3" x2="7" y2="7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="20" y1="3" x2="17" y2="7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </div>
          <div class="metric-card-body">
            <span class="metric-label">远程监控</span>
            <strong id="monitor-status">未连接</strong>
            <p id="monitor-hint">点击查看老人端实时画面</p>
          </div>
        </article>
        <!-- 反诈提醒卡片 -->
        <article class="metric-card fraud-card" id="fraud-card" onclick="Family.showFraudPanel()">
          <div class="metric-card-icon fraud-icon">
            <svg viewBox="0 0 24 24" width="22" height="22"><path d="M12 2L2 7l10 5 10-5-10-5z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M2 17l10 5 10-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M2 12l10 5 10-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
          </div>
          <div class="metric-card-body">
            <span class="metric-label">反诈提醒</span>
            <strong id="fraud-count">0 条</strong>
            <p id="fraud-hint">暂无新提醒</p>
          </div>
        </article>
        <!-- 摔倒检测卡片 -->
        <article class="metric-card fall-card" id="fall-card">
          <div class="metric-card-icon fall-icon">
            <svg viewBox="0 0 24 24" width="22" height="22"><circle cx="12" cy="5" r="3" fill="none" stroke="currentColor" stroke-width="2"/><path d="M8 23c0-4 2-7 4-7s4 3 4 7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M5 12l3 3 4-4 4 4 3-3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <div class="metric-card-body">
            <span class="metric-label">摔倒检测</span>
            <strong id="fall-status">正常</strong>
            <p id="fall-hint">老人端运动监测中</p>
          </div>
        </article>
      </section>

      <!-- 操作区域：添加提醒 + 列表 -->
      <section class="family-layout">
        <form class="reminder-form card" id="reminder-form">
          <div class="card-header">
            <div class="card-header-left">
              <svg viewBox="0 0 20 20" width="20" height="20"><line x1="10" y1="4" x2="10" y2="10" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/><line x1="10" y1="10" x2="14" y2="10" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/><path d="M10 2a8 8 0 100 16 8 8 0 000-16z" fill="none" stroke="currentColor" stroke-width="1.8"/></svg>
              <h2>添加提醒</h2>
            </div>
            <button type="button" class="btn-chip" id="btn-quick">
              <svg viewBox="0 0 16 16" width="14" height="14"><path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
              快捷：晚8点吃药
            </button>
          </div>
          <label>
            提醒内容
            <input id="input-title" name="title" type="text" value="吃降压药" autocomplete="off">
          </label>
          <div class="form-row">
            <label>
              类型
              <select id="input-type" name="type">
                <option value="吃药">吃药</option>
                <option value="打针">打针</option>
                <option value="喝水">喝水</option>
                <option value="复诊">复诊</option>
                <option value="出门">出门</option>
                <option value="自定义">自定义</option>
              </select>
            </label>
            <label>
              时间
              <input id="input-time" name="time" type="time">
            </label>
          </div>

          <!-- 周期设置 -->
          <div class="cycle-section" id="cycle-section">
            <label>提醒周期</label>
            <div class="cycle-tabs">
              <button type="button" class="cycle-tab active" data-cycle="daily" onclick="Family.setCycle('daily')">每天</button>
              <button type="button" class="cycle-tab" data-cycle="weekly" onclick="Family.setCycle('weekly')">每周</button>
              <button type="button" class="cycle-tab" data-cycle="monthly" onclick="Family.setCycle('monthly')">每月</button>
              <button type="button" class="cycle-tab" data-cycle="custom" onclick="Family.setCycle('custom')">每N天</button>
            </div>
            <div class="cycle-detail" id="cycle-detail">
              <!-- 默认每天，无需额外选项 -->
              <p class="cycle-hint">每天同一时间提醒老人</p>
            </div>
          </div>
          <label>
            给老人看的说明
            <textarea id="input-note" name="note" rows="2">请按医嘱服用，吃过后点"我吃过了"。</textarea>
          </label>
          <button class="btn-primary full btn-submit" type="submit">
            <svg viewBox="0 0 20 20" width="18" height="18"><path d="M4 10l4 4 8-8" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            保存提醒
          </button>
        </form>

        <section class="list-panel card">
          <div class="card-header">
            <div class="card-header-left">
              <svg viewBox="0 0 20 20" width="20" height="20"><line x1="4" y1="6" x2="16" y2="6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="4" y1="10" x2="16" y2="10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="4" y1="14" x2="12" y2="14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
              <h2>提醒状态</h2>
            </div>
            <span class="sync-badge">
              <svg viewBox="0 0 14 14" width="12" height="12"><path d="M2 7a5 5 0 0110 0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M12 7l-2-2m2 2l-2 2" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
              已同步
            </span>
          </div>
          <div class="reminder-list" id="family-reminder-list"></div>
        </section>
      </section>

      <!-- 吃药报告 -->
      <section class="card report-card" id="report-card">
        <div class="card-header">
          <div class="card-header-left">
            <svg viewBox="0 0 20 20" width="20" height="20"><path d="M4 10h12M4 10l2-2m-2 2l2 2M16 10l-2-2m2 2l-2 2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><rect x="6" y="3" width="8" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="1.8"/></svg>
            <h2>吃药报告（最近7天）</h2>
          </div>
        </div>
        <div id="medication-report-body">
          <p style="color: var(--muted); text-align: center; padding: 20px;">暂无用药提醒数据</p>
        </div>
      </section>

      <!-- 语音留言 -->
      <section class="card voice-card" id="voice-card">
        <div class="card-header">
          <div class="card-header-left">
            <svg viewBox="0 0 20 20" width="20" height="20"><path d="M10 2a3 3 0 013 3v4a3 3 0 01-6 0V5a3 3 0 013-3z" fill="none" stroke="currentColor" stroke-width="2"/><path d="M5 9v1a5 5 0 0010 0V9" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="10" y1="15" x2="10" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            <h2>语音留言</h2>
          </div>
        </div>
        <div id="voice-message-list">
          <p style="color: var(--muted); text-align: center; padding: 20px;">暂无语音留言</p>
        </div>
      </section>

      <!-- 子女端返回老人端 -->
      <div class="family-back-bar">
        <button class="btn-ghost" id="btn-back-elder">
          <svg viewBox="0 0 20 20" width="16" height="16"><path d="M13 4l-6 6 6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          返回老人端
